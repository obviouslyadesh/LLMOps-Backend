services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - llmops_old_net

  backend:
    build: .
    container_name: llmops-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    networks:
      - llmops_old_net

volumes:
  qdrant_data:

networks:
  llmops_old_net:
    driver: bridge